<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EventTrax Auth</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#050510;color:#fff;display:flex;height:100vh}
.panel{width:50%;padding:60px}
.right{background:#0a0a18}
input{width:100%;padding:12px;border-radius:8px;border:none;margin:10px 0}
button{width:100%;padding:14px;border:none;border-radius:10px;background:#00d4aa;font-weight:bold}
a{color:#00d4aa;text-decoration:none;font-size:13px}
.hidden{display:none}
.error{background:#400;padding:10px;border-radius:6px;margin-bottom:10px}
</style>
</head>

<body>

<div class="panel">
<h1>EventTrax</h1>
<p>Manage events end-to-end.</p>
</div>

<div class="panel right">

<div id="error" class="error hidden"></div>

<h2 id="title">Sign in</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<div style="text-align:right">
<a href="#" onclick="forgot()">Forgot password?</a>
</div>

<button onclick="login()" id="loginBtn">Sign in</button>

<p style="margin-top:15px">
Don't have an account?
<a href="#" onclick="toggle()">Create one</a>
</p>

<button id="signupBtn" class="hidden" onclick="signup()">Create account</button>

</div>

<script>
const SUPABASE_URL="https://pxtpsugbuunjzurdvzkc.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4dHBzdWdidXVuanp1cmR2emtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA1NDY4OTIsImV4cCI6MjA4NjEyMjg5Mn0.VXRKe2AXSiv8vRxfoPDyBl9McRmkYDVUBcRN2Jy6q5g";

const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let mode="login";

function toggle(){
mode=mode==="login"?"signup":"login";
document.getElementById("title").innerText=mode==="login"?"Sign in":"Create account";
document.getElementById("loginBtn").classList.toggle("hidden");
document.getElementById("signupBtn").classList.toggle("hidden");
}

function show(msg){
const e=document.getElementById("error");
e.innerText=msg;
e.classList.remove("hidden");
}

async function login(){
const email=emailInput();
const pass=passwordInput();

const {error}=await db.auth.signInWithPassword({email,password:pass});

if(error){show(error.message);return;}

location.href="participant.html";
}

async function signup(){
const email=emailInput();
const pass=passwordInput();

const {error}=await db.auth.signUp({email,password:pass});

if(error){show(error.message);return;}

alert("Check your email to confirm.");
}

async function forgot(){
const email=emailInput();
if(!email){show("Enter email first");return;}

const {error}=await db.auth.resetPasswordForEmail(email,{
redirectTo:"https://aruna24799.github.io/eventtrax-clean/reset.html"
});

if(error){show(error.message);return;}

alert("Reset email sent.");
}

function emailInput(){return document.getElementById("email").value.trim();}
function passwordInput(){return document.getElementById("password").value;}

</script>

</body>
</html>
